<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StoreClick - Crea tu Tienda Online en Minutos y Vende por WhatsApp</title>
    <meta name="description" content="La plataforma SaaS más rápida para crear tu catálogo digital. Recibe pedidos directamente en WhatsApp, gestiona tus productos y haz crecer Tu negocio.">
    <meta name="keywords" content="tienda online, whatsapp marketing, catálogo digital, ecommerce perú, ventas whatsapp, saas retail">
    <meta property="og:title" content="StoreClick - Tu Negocio en WhatsApp">
    <meta property="og:description" content="Transforma tu negocio con una tienda virtual profesional.">
    <meta property="og:image" content="https://images.unsplash.com/photo-1557821552-17105176677c?auto=format&fit=crop&q=80&w=1200">
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Librería QR Code para SaaS -->
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        #initial-loader {
            position: fixed;
            inset: 0;
            background: #030712;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.5s ease-out, visibility 0.5s;
        }
        #initial-loader.fade-out {
            opacity: 0;
            visibility: hidden;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(99, 102, 241, 0.2);
            border-top-color: #6366f1;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        #view-error-root {
            display: none;
            position: fixed;
            inset: 0;
            background: #030712;
            color: white;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 24px;
            z-index: 10000;
        }
    </style>
</head>
<body>

    <div id="initial-loader">
        <div class="spinner"></div>
    </div>

    <div id="view-error-root">
        <h2 class="text-2xl font-bold mb-4">Error al cargar la aplicación</h2>
        <p class="text-slate-400 mb-8" id="error-message">No se pudieron cargar las vistas necesarias.</p>
        <button class="btn btn-primary" onclick="location.reload()">Reintentar</button>
    </div>

    <div id="app-root"></div>

    <!-- Scripts -->
    <script src="js/env.js"></script>
    <script src="js/config.js"></script>
    <script src="js/views.js"></script>
    <script src="js/app.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/storefront.js"></script>
    <script src="js/admin.js"></script>

</body>
</html>
