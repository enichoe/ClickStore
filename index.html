    <style>
        #initial-loader {
            position: fixed;
            inset: 0;
            background: #030712;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.5s ease-out, visibility 0.5s;
        }
        #initial-loader.fade-out {
            opacity: 0;
            visibility: hidden;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(99, 102, 241, 0.2);
            border-top-color: #6366f1;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        #view-error-root {
            display: none;
            position: fixed;
            inset: 0;
            background: #030712;
            color: white;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 24px;
            z-index: 10000;
        }
    </style>
</head>
<body>

    <div id="initial-loader">
        <div class="spinner"></div>
    </div>

    <div id="view-error-root">
        <h2 class="text-2xl font-bold mb-4">Error al cargar la aplicación</h2>
        <p class="text-slate-400 mb-8" id="error-message">No se pudieron cargar las vistas necesarias.</p>
        <button class="btn btn-primary" onclick="location.reload()">Reintentar</button>
    </div>
