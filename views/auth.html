<!-- Login -->
<div id="view-login" class="modal" onclick="if(event.target === this) showView('view-landing')">
    <div class="modal-content dark-modal">
        <button class="absolute top-6 right-6 text-slate-500 hover:text-white transition-colors" onclick="showView('view-landing')">
            <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
        <h2 class="text-white text-2xl mb-6">Iniciar Sesión</h2>
        <div class="input-group mb-4">
            <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-2 block">Email</label>
            <input type="email" id="login-email" class="input" placeholder="tu@email.com">
        </div>
        <div class="input-group mb-6">
            <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-2 block">Contraseña</label>
            <input type="password" id="login-pass" class="input">
        </div>
        <button class="btn btn-primary w-full" onclick="handleLogin(this)">Entrar</button>
        <p class="mt-6 text-center text-slate-400 text-sm">
            ¿No tienes tienda? <a class="text-indigo-400 font-bold cursor-pointer hover:underline" onclick="switchAuth('view-register')">Regístrate</a>
        </p>
    </div>
</div>

<!-- Registro (Onboarding) -->
<div id="view-register" class="modal" onclick="if(event.target === this) showView('view-landing')">
    <div class="modal-content dark-modal" style="max-width: 600px;">
        <button class="absolute top-6 right-6 text-slate-500 hover:text-white transition-colors" onclick="showView('view-landing')">
            <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
        <h2 class="text-white text-2xl mb-2">Crea tu Tienda</h2>
        <p class="text-slate-400 text-sm mb-8">Configura tu negocio en minutos.</p>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div class="input-group">
                <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-2 block">Nombre de tu Tienda</label>
                <input type="text" id="reg-store-name" class="input" placeholder="Ej: Pizza Don Luis">
            </div>
            <div class="input-group">
                <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-2 block">Tipo de Negocio</label>
                <select id="reg-type" class="input">
                    <option>Tienda de Ropa</option>
                    <option>Restaurant</option>
                    <option>Tecnología</option>
                </select>
            </div>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mt-4">
            <div class="input-group">
                <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-2 block">Tu Nombre</label>
                <input type="text" id="reg-owner" class="input" placeholder="Tu nombre">
            </div>
            <div class="input-group">
                <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-2 block">Email</label>
                <input type="email" id="reg-email" class="input" placeholder="tu@email.com">
            </div>
        </div>
        <div class="input-group" style="margin-top: 16px;">
            <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-2 block">Contraseña</label>
            <input type="password" id="reg-pass" class="input">
        </div>
        
        <button class="btn btn-primary w-full mt-8" onclick="handleRegister(this)">
            Crear mi Tienda
        </button>
        <p class="mt-6 text-center text-slate-400 text-sm">
            ¿Ya tienes tienda? <a class="text-indigo-400 font-bold cursor-pointer hover:underline" onclick="switchAuth('view-login')">Inicia Sesión</a>
        </p>
    </div>
</div>
