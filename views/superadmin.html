<div id="view-superadmin" style="display: none;">
    <aside class="sidebar" id="super-sidebar">
        <div style="margin-bottom: 24px; padding-bottom: 16px; border-bottom: 1px solid var(--border);">
            <h2 style="font-size: 18px; color: var(--accent);">Super Admin</h2>
            <span style="font-size: 12px; color: var(--text-sec);">Control Maestro</span>
        </div>
        <nav>
            <div class="nav-item active" onclick="showSuperAdminSection('dash'); toggleSidebar(false)">
                <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
                Estadísticas
            </div>
            <div class="nav-item" onclick="showSuperAdminSection('stores'); toggleSidebar(false)">
                <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/></svg>
                Tiendas
            </div>
        </nav>
        <div style="margin-top: auto; padding-top: 16px; border-top: 1px solid var(--border);">
            <button class="btn btn-ghost w-full" style="color: var(--text-sec);" onclick="logout()">Cerrar Sesión</button>
        </div>
    </aside>

    <header class="admin-mobile-header">
        <button class="menu-toggle" onclick="toggleSidebarSuper()">
            <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 6h16M4 12h16m-7 6h7"/></svg>
        </button>
        <h2 style="font-size: 18px; color: var(--accent); margin: 0;">Super Admin</h2>
    </header>

    <main class="main-admin">
        <div id="section-super-dash" class="fade-in">
            <h2 style="margin-bottom: 24px;">Global Overview</h2>
            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 24px;">
                <div class="card">
                    <p style="color: var(--text-sec);">Tiendas Totales</p>
                    <p style="font-size: 32px; font-weight: 700;" id="super-total-stores">0</p>
                </div>
                <div class="card">
                    <p style="color: var(--text-sec);">Pedidos Totales (Red)</p>
                    <p style="font-size: 32px; font-weight: 700; color: var(--accent);" id="super-total-orders">0</p>
                </div>
            </div>
        </div>

        <div id="section-super-stores" class="fade-in" style="display: none;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
                <h2>Gestión de Tiendas</h2>
                <button class="btn btn-primary" onclick="openStoreModal()">Crear Nueva Tienda</button>
            </div>
            <div class="card" style="padding: 0; overflow: hidden;">
                <div id="super-stores-list">
                    <!-- Lista de tiendas -->
                </div>
            </div>
        </div>
    </main>
</div>
